# Fluentd configuration — ships ASI server logs to Elasticsearch/Loki
<source>
  @type tail
  path /var/log/asi-server.log
  pos_file /var/log/asi-server.log.pos
  tag asi.server
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%NZ
  </parse>
</source>

<match asi.server>
  @type copy
  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    logstash_format true
    logstash_prefix asi-server
    include_tag_key true
  </store>
  <store>
    @type stdout
  </store>
</match>
