syntax = "proto3";
package asi;

// ASI AI Coding Assistant gRPC API
service ASIService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Chat(ChatRequest) returns (stream ChatEvent);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
}

message HealthRequest {}
message HealthResponse { string status = 1; bool database = 2; bool ai_provider = 3; }

message ChatRequest {
  repeated Message messages = 1;
  string agent = 2;  // "code" | "review" | "deep"
  string session_id = 3;
}

message Message {
  string role = 1;     // "user" | "assistant" | "system"
  string content = 2;
}

message ChatEvent {
  string event_type = 1;  // "text" | "tool_call" | "tool_result" | "done" | "error"
  string data = 2;
}

message ListModelsRequest {}
message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  string id = 1;
  string name = 2;
  string provider = 3;
  bool available = 4;
}
