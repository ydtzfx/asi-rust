<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI — AI Coding Assistant</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header .status { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 999px; }
        header .status.on { background: #065f46; color: #6ee7b7; }
        main { flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { padding: 0.75rem 1rem; border-radius: 0.75rem; max-width: 85%; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: #3b82f6; color: #fff; }
        .msg.assistant { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
        .msg.assistant pre { background: #0f172a; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; font-size: 0.85rem; }
        .msg.assistant code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85rem; }
        .msg.tool { align-self: flex-start; background: #1e1b4b; border: 1px solid #4338ca; color: #a5b4fc; font-size: 0.8rem; }
        .msg.tool .name { font-weight: 700; color: #c7d2fe; }
        footer { background: #1e293b; padding: 1rem 2rem; border-top: 1px solid #334155; }
        #chat-form { display: flex; gap: 0.5rem; max-width: 800px; margin: 0 auto; width: 100%; }
        #chat-input { flex: 1; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 1rem; outline: none; resize: none; }
        #chat-input:focus { border-color: #3b82f6; }
        #chat-submit { padding: 0.75rem 1.5rem; border-radius: 0.75rem; border: none; background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; }
        #chat-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .thinking { display: flex; gap: 0.25rem; padding: 0.5rem; }
        .thinking span { width: 8px; height: 8px; border-radius: 50%; background: #60a5fa; animation: bounce 1.4s infinite ease-in-out; }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <header>
        <h1>ASI — AI Coding Assistant</h1>
        <span id="status" class="status on">● Ollama</span>
    </header>
    <main>
        <div id="messages">
            <div class="msg assistant">
                Hello! I'm ASI-Code, powered by Ollama. I can read/write files, list directories, and run commands. Ask me anything about your code!
            </div>
        </div>
    </main>
    <footer>
        <form id="chat-form">
            <input id="chat-input" type="text" placeholder="Type a message..." autofocus>
            <button id="chat-submit" type="submit">Send</button>
        </form>
    </footer>
    <script>
        const messagesEl = document.getElementById('messages');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('chat-input');
        const submitBtn = document.getElementById('chat-submit');
        const statusEl = document.getElementById('status');

        function addMsg(role, html) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = html;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function addTool(name, args) {
            return addMsg('tool', `<span class="name">🔧 ${escapeHtml(name)}</span> ${escapeHtml(args)}`);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderMd(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            submitBtn.disabled = true;

            addMsg('user', escapeHtml(text));
            const assistantMsg = addMsg('assistant', '<div class="thinking"><span></span><span></span><span></span></div>');
            let responseText = '';

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-User-ID': 'web-user' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: text }] }),
                });
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    // SSE messages end with \n\n. Split on double-newline to get
                    // complete event blocks, keeping any partial block in the buffer.
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop() || '';
                    for (const block of parts) {
                        if (!block.trim()) continue;
                        let eventType = '', data = '';
                        for (const line of block.split('\n')) {
                            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
                            if (line.startsWith('data: ')) data += line.slice(6);
                        }
                        if (eventType === 'text' || !eventType) {
                            responseText += data;
                            assistantMsg.innerHTML = renderMd(responseText);
                        } else if (eventType === 'tool_call') {
                            try { const j = JSON.parse(data); addTool(j.name, j.arguments); } catch(_) {}
                        } else if (eventType === 'tool_result') {
                            try { const j = JSON.parse(data); addTool('↩ ' + j.name, j.truncated ? j.result + ' [truncated]' : j.result); } catch(_) {}
                        } else if (eventType === 'error') {
                            assistantMsg.innerHTML = '<span style="color:#f87171">❌ ' + escapeHtml(data) + '</span>';
                        } else if (eventType === 'done') {
                            // usage data — ignore for display
                        }
                    }
                }
            } catch (err) {
                assistantMsg.innerHTML = '<span style="color:#f87171">❌ Connection error: ' + escapeHtml(err.message) + '</span>';
            } finally {
                submitBtn.disabled = false;
                input.focus();
            }
        });
    </script>
</body>
</html>
