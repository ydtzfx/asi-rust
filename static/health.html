<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASI Health Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:2rem}
h1{font-size:1.5rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
.card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1.5rem}
.card h2{font-size:1rem;color:#94a3b8;margin-bottom:.5rem}
.card .value{font-size:2rem;font-weight:700}
.ok{color:#4ade80}.warn{color:#fbbf24}.err{color:#f87171}
.status-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:.5rem}
.status-dot.ok{background:#4ade80}.status-dot.err{background:#f87171}
</style>
</head>
<body>
<h1>ASI Server Health</h1>
<div class="grid">
<div class="card"><h2>Server</h2><div class="value ok" id="server">—</div></div>
<div class="card"><h2>Database</h2><div class="value" id="db">—</div></div>
<div class="card"><h2>AI Provider</h2><div class="value" id="ai">—</div></div>
<div class="card"><h2>Version</h2><div class="value" id="ver">—</div></div>
<div class="card"><h2>Sessions</h2><div class="value" id="sessions">—</div></div>
<div class="card"><h2>Tokens Used</h2><div class="value" id="tokens">—</div></div>
</div>
<script>
async function refresh(){
  try{
    const r=await (await fetch('/api/ready')).json();
    document.getElementById('server').innerHTML='<span class="status-dot ok"></span>Running';
    document.getElementById('db').className='value '+(r.database?'ok':'err');
    document.getElementById('db').textContent=r.database?'Healthy':'Down';
    document.getElementById('ai').className='value '+(r.ai_provider?'ok':'warn');
    document.getElementById('ai').textContent=r.ai_provider?'Connected':'Degraded';
  }catch(e){
    document.getElementById('server').innerHTML='<span class="status-dot err"></span>Down';
  }
  try{
    const v=await (await fetch('/api/version')).json();
    document.getElementById('ver').textContent='v'+v.version+' ('+v.rustc.split(' ')[0]+')';
  }catch(e){}
  try{
    const m=await (await fetch('/api/metrics')).text();
    const sm=m.match(/asi_sessions_total (\d+)/);
    const tm=m.match(/asi_tokens_used_total (\d+)/);
    if(sm)document.getElementById('sessions').textContent=sm[1];
    if(tm)document.getElementById('tokens').textContent=tm[1];
  }catch(e){}
}
refresh();setInterval(refresh,30000);
</script>
</body>
</html>
